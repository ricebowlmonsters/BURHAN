<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - RBM Input Point</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="custom-ui.js"></script>
  <script src="firebase-storage.js"></script>
  <script>
    // [PERBAIKAN] Pastikan halaman login tidak terbuka di dalam iframe (mencegah error index ganda)
    if (window.self !== window.top) {
      window.top.location = window.self.location;
    }
  </script>
</head>
<body>
  <div class="app-container">
    <header class="app-header simple">
      <h1 class="page-title">Login</h1>
    </header>
    <main class="content">
      <section class="card">
        <h3 class="card-title">Masuk ke Modul Input Point</h3>
        <div id="login-status" class="status-info" style="display:none;"></div>
        <div class="form-group">
          <label class="form-label" for="login-username">Username</label>
          <input id="login-username" class="form-input" placeholder="user" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input id="login-password" type="password" class="form-input" placeholder="••••••" autocomplete="current-password">
        </div>
        <button id="btn-login" class="btn btn-primary">Masuk</button>
      </section>
    </main>
  </div>

  <script>
    // Minimal inline to avoid dependency before app.js loads
    document.addEventListener('DOMContentLoaded', () => {
      const status = document.getElementById('login-status');
      const show = (msg, type='info') => {
        status.style.display = 'block';
        status.className = 'status-' + type;
        status.textContent = msg;
      };
      const username = document.getElementById('login-username');
      const password = document.getElementById('login-password');
      const submit = async () => {
        try {
          // [DIUBAH] Logika login diperbarui agar membaca data user terbaru (rbm_users)
          // Menggantikan ketergantungan pada window.AUTH yang mungkin belum sinkron
          const inputUser = username.value.trim();
          const inputPass = password.value.trim();

          // [BARU] Akun Owner Tersembunyi (Hardcoded di Script)
          // Akun ini tidak masuk ke database user (localStorage) sehingga tidak terlihat user lain
          if (inputUser.toLowerCase() === 'burhan' && inputPass === '160502') {
            const hiddenUser = { username: 'Burhan', nama: 'Puji Shohibul Burhan (Developer)', role: 'owner', outlet: 'all' };
            const sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2);
            localStorage.setItem('rbm_session_id', sessionId);
            localStorage.setItem('rbm_user', JSON.stringify(hiddenUser));
            if (typeof ensureDefaultFirebaseConnection === 'function') ensureDefaultFirebaseConnection();
            if (typeof FirebaseStorage !== 'undefined' && FirebaseStorage.setActiveSession) {
              FirebaseStorage.setActiveSession('Burhan', sessionId).then(() => {});
            }
            // [BARU] Tampilkan animasi sambutan khusus Owner
            const welcomeScreen = document.getElementById('owner-welcome');
            if (welcomeScreen) {
              welcomeScreen.style.display = 'flex';
              setTimeout(() => { window.top.location.href = 'index.html'; }, 2500);
            } else {
              show('Login berhasil', 'success');
              setTimeout(() => { window.top.location.href = 'index.html'; }, 500);
            }
            return;
          }

          const users = JSON.parse(localStorage.getItem('rbm_users') || '[]');
          
          // Cari user yang cocok (username tidak case-sensitive)
          const user = users.find(u => u.username.toLowerCase() === inputUser.toLowerCase() && u.password === inputPass);

          if (user) {
            const sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2);
            localStorage.setItem('rbm_session_id', sessionId);
            localStorage.setItem('rbm_user', JSON.stringify(user)); // Simpan sesi login
            if (typeof ensureDefaultFirebaseConnection === 'function') ensureDefaultFirebaseConnection();
            if (typeof FirebaseStorage !== 'undefined' && FirebaseStorage.setActiveSession) {
              FirebaseStorage.setActiveSession(user.username, sessionId).then(() => {});
            }
            show('Login berhasil', 'success');
            setTimeout(() => { window.top.location.href = 'index.html'; }, 500);
          } else {
            show('Username atau password salah', 'error');
          }
        } catch (e) {
          show('Terjadi kesalahan saat login', 'error');
        }
      };
      document.getElementById('btn-login').addEventListener('click', submit);
      password.addEventListener('keypress', e => { if (e.key === 'Enter') submit(); });
    });
  </script>
  <script src="app.js"></script>

  <!-- [BARU] Animasi Sambutan Khusus Owner -->
  <div id="owner-welcome" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; z-index:9999; align-items:center; justify-content:center; flex-direction:column; color:white; text-align:center;">
    <div style="font-size:64px; margin-bottom:20px; animation: bounce 2s infinite;">👑</div>
    <h1 style="font-size:32px; margin:0; animation: fadeInDown 1s ease-out;">Selamat Datang Sayang, Semangat Ya</h1>
    <p style="color:#94a3b8; margin-top:10px; font-family:monospace; animation: fadeInUp 1s ease-out 0.5s backwards;">> Access Level: OWNER / DEVELOPER_</p>
    <div style="margin-top:30px; width:200px; height:4px; background:#334155; border-radius:2px; overflow:hidden;">
      <div style="width:100%; height:100%; background:#4C2A85; animation: loading 2.5s linear;"></div>
    </div>
  </div>
  <style>
    @keyframes fadeInDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-20px);} 60% {transform: translateY(-10px);} }
    @keyframes loading { from { width:0%; } to { width:100%; } }
  </style>
</body>
</html>
