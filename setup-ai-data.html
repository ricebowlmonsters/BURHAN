        function uploadData() {
            const status = document.getElementById('status');
            status.textContent = "Sedang mengupload...";
            
            // Hapus data lama dulu agar bersih
            db.ref('ai_responses').remove().then(() => {
                const promises = defaultResponses.map(item => {
                    return db.ref('ai_responses').push({
                        ...item,
                        createdAt: firebase.database.ServerValue.TIMESTAMP
                    });
                });

                Promise.all(promises).then(() => {
                    status.textContent = "✅ Berhasil! Semua data AI sudah masuk ke database.";
                    status.style.color = "green";
                }).catch(err => {
                    status.textContent = "❌ Gagal: " + err.message;
                    status.style.color = "red";
                });
            });
